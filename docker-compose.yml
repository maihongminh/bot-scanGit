version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: github_scanner_db
    environment:
      POSTGRES_USER: github_scanner
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: github_scanner
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - github_scanner_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U github_scanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: github_scanner_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - github_scanner_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github_scanner_backend
    environment:
      DATABASE_URL: postgresql://github_scanner:secure_password_change_me@postgres:5432/github_scanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "False"
      LOG_LEVEL: INFO
      FRONTEND_URL: http://localhost:3000
      MAX_WORKERS: 5
      SCAN_BATCH_SIZE: 50
      REPO_SCAN_INTERVAL: 3600
      TRENDING_REPO_COUNT: 30
      MAX_COMMITS_PER_REPO: 100
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - github_scanner_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github_scanner_celery_worker
    environment:
      DATABASE_URL: postgresql://github_scanner:secure_password_change_me@postgres:5432/github_scanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      LOG_LEVEL: INFO
      MAX_WORKERS: 5
      MAX_COMMITS_PER_REPO: 100
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - github_scanner_network
    command: celery -A celery_app worker -l info --concurrency=4

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: github_scanner_celery_beat
    environment:
      DATABASE_URL: postgresql://github_scanner:secure_password_change_me@postgres:5432/github_scanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - github_scanner_network
    command: celery -A celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: github_scanner_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - github_scanner_network
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  github_scanner_network:
    driver: bridge
